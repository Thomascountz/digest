name: Generate Daily Digest

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 7 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1

      - name: Run digest script
        run: ruby digest.rb

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          shopt -s nullglob
          git add *.md *.html *.txt .last_run
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            if ! git diff --staged --quiet -- *.md *.html *.txt; then
              echo "digest_changed=true" >> "$GITHUB_OUTPUT"
            fi
            git commit -m "Update digest for $(date +%Y-%m-%d)"
            git push
          fi

      - name: Create and push tag
        run: |
          TAG="v$(date +%Y-%m-%d)"
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Email digests
        if: steps.commit.outputs.digest_changed == 'true'
        continue-on-error: true
        env:
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          RUBY_DIGEST_RECIPIENT: ${{ secrets.RUBY_DIGEST_RECIPIENT }}
        run: ruby mail.rb
